url: https://eba28.github.io/athanor/
template:
  bootstrap: 5
  # bootswatch: flatly
  theme: atom-one-light
  theme-dark: atom-one-dark
reference:
- title: Quality Control
  desc: Functions for QC and filtering.
- contents:
  - reformat_vdj_barcode
  - reformat_vdj_barcode_sample
- title: Gene Expression
  desc: Functions for processing and analyzing gene expression data.
- contents:
  - add_annotations
  - automated_annotation
  - cell_type_clusters
  - find_k_clusters
  - get_airr_genes
  - seurat_pipeline
- title: Adaptive Immune Receptors
  desc: Functions for processing and analyzing adaptive immune receptor data.
- subtitle: Read in data
- contents:
  - process_airrflow
- subtitle: BCR embeddings
- contents:
  - bcr_embeddings_pipeline
  - convert_embeddings
- subtitle: BCR features
- contents:
  - add_family_info
  - bin_mu_freq
  - factor_family_info
  - process_bcr_features
- title: GEX and AIRR Integration
  desc: Functions for integrating gene expression and adaptive immune receptor data.
- subtitle: Metadata
- contents:
  - gex_add_airr
- subtitle: Concatenation
- contents:
  - concatenate_gex_bcr
- subtitle: Weighted Nearest Neighbors
- contents:
  - extract_wnn_vars
  - run_wnn
- title: Evaluation
  desc: Functions for evaluating the performance of models and analyses.
- subtitle: ADT-based on kNN
- contents:
  - calc_adt_correlation
  - calc_adt_dists
  - calc_adt_moran
  - calc_adt_nn_within_range
  - calc_adt_quantile
  - calc_neighbor_matches
- subtitle: Clustering-based
- contents:
  - calc_distances
  - calc_ext_metrics
  - calc_int_metrics
- title: Applications
  desc: Functions for applying the package to specific use cases.
- subtitle: Reclassification
- title: Plotting
  desc: Functions for visualizing data and results.
- contents:
  - add_info_bar
  - calc_pcts
  - contains("plot")
- title: Simulations
  desc: Simulate GEX and AIRR data.
- contents:
  - contains("sim")
- title: Utilities
  desc: Utility functions for various tasks.
- contents:
  - reduce_object
