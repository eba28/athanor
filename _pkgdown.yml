url: https://eba28.github.io/athanor/

template:
  bootstrap: 5
  # bootswatch: flatly
  theme: arrow-light # atom-one-light, https://pkgdown.r-lib.org/articles/customise.html#syntax-highlighting
  theme-dark: arrow-dark # atom-one-dark

articles:
- title: Pipeline
  navbar: Pipeline
  contents:
  - main_pipeline
- title: Visualization
  navbar: Visualization
  contents:
  - plot_dimplot

reference:
- title: Quality Control
  desc: Functions for QC and filtering.
- contents:
